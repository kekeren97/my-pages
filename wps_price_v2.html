<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WPS 报价单</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
:root{
  --primary:#7b39fc;
  --primary-dark:#2b2344;
  --primary-light:#9d6aff;
  --accent:#6366f1;
  --surface:rgba(255,255,255,.82);
  --surface-solid:#fff;
  --surface-dim:#f5f3fa;
  --surface-hover:#f8f6ff;
  --text:#1e1b2e;
  --text-secondary:#64748b;
  --text-muted:#94a3b8;
  --border:rgba(139,92,246,.12);
  --border-solid:#e8e4f0;
  --border-focus:#b794f6;
  --danger:#ef4444;
  --shadow-sm:0 1px 4px rgba(43,35,68,.06);
  --shadow-md:0 4px 20px rgba(43,35,68,.08);
  --shadow-lg:0 12px 40px rgba(43,35,68,.14);
  --radius:10px;
  --radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;background:var(--surface-dim);background-image:radial-gradient(ellipse at 15% 0%,rgba(123,57,252,.07) 0%,transparent 55%),radial-gradient(ellipse at 85% 100%,rgba(99,102,241,.05) 0%,transparent 50%);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── App Shell ── */
.app{max-width:920px;margin:0 auto;padding:20px 16px 40px}
.app-header{margin-bottom:28px;padding:22px 28px;background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 60%,var(--primary-light) 100%);border-radius:var(--radius-lg);color:#fff;box-shadow:0 8px 32px rgba(123,57,252,.3);position:relative;overflow:hidden}
.app-header::before{content:'';position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.07)}
.app-header::after{content:'';position:absolute;right:50px;bottom:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.04)}
.app-header h1{font-size:20px;font-weight:700;letter-spacing:.5px;position:relative}
.app-header p{font-size:12px;opacity:.7;margin-top:3px;position:relative}

/* ── Cards ── */
.card{background:var(--surface);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:var(--radius-lg);padding:22px 24px;margin-bottom:16px;border:1px solid var(--border);box-shadow:var(--shadow-sm);transition:all .25s}
.card:hover{box-shadow:var(--shadow-md);border-color:var(--border-focus)}
.card-accent{border-left:3px solid var(--primary);border-left-color:var(--primary)}
.h2{font-size:15px;font-weight:700;color:var(--primary-dark);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.label{font-size:11px;color:var(--text-secondary);font-weight:600;margin-bottom:5px;display:block;letter-spacing:.3px}

/* ── Inputs ── */
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;box-sizing:border-box;font-family:inherit;transition:all .2s;background:var(--surface)}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(43,92,186,.08)}
input::placeholder{color:var(--text-muted)}
.row4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:10px}
.row5{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:10px;margin-top:10px}

/* ── Buttons ── */
.btn{padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;position:relative}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(123,57,252,.25)}
.btn-primary:hover{background:var(--primary-dark);box-shadow:0 4px 16px rgba(123,57,252,.35)}
.btn-secondary{background:var(--surface-dim);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:#eef1f6}
.btn-danger{background:#fef2f2;color:var(--danger);font-size:11px;padding:4px 10px;border:1px solid #fecaca}
.btn-pick{width:100%;padding:16px;font-size:13px;border:2px dashed var(--border-focus);border-radius:var(--radius);background:var(--surface-hover);color:var(--primary);font-weight:600;letter-spacing:.3px}
.btn-pick:hover{background:#eef4ff;border-color:var(--primary);border-style:solid}
.btn-generate{padding:15px 60px;font-size:16px;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 6px 28px rgba(123,57,252,.35);letter-spacing:.5px}
.btn-generate:hover{box-shadow:0 10px 36px rgba(123,57,252,.45);transform:translateY(-2px)}
.btn-generate:disabled{opacity:.3;cursor:not-allowed;box-shadow:none;transform:none}
.tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:10px;font-weight:600}

/* ── Chips ── */
.chip{padding:7px 16px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;color:var(--text);transition:all .2s;font-family:inherit}
.chip:hover{border-color:var(--primary);color:var(--primary);background:var(--surface-hover);transform:translateY(-1px);box-shadow:0 2px 8px rgba(123,57,252,.1)}
.chip.active{border-color:var(--primary);background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;box-shadow:0 3px 12px rgba(123,57,252,.3)}
.chip-group{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}

/* ── SKU Options ── */
.sku-option{display:block;width:100%;text-align:left;padding:14px 16px;margin-bottom:8px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface);cursor:pointer;font-family:inherit;font-size:13px;transition:all .2s}
.sku-option:hover{border-color:var(--primary);background:var(--surface-hover);box-shadow:var(--shadow-sm)}

/* ── Product Row ── */
.product-row{padding:16px 18px;background:var(--surface-solid);border-radius:12px;margin-bottom:12px;border:1px solid var(--border-solid);transition:all .25s}
.product-row:hover{border-color:var(--border-focus);box-shadow:0 4px 16px rgba(123,57,252,.06)}
.calc-preview{margin-top:10px;padding:10px 14px;background:linear-gradient(135deg,#f5f0ff,#ece5ff);border-radius:8px;font-size:12px;display:flex;flex-wrap:wrap;gap:8px 20px;border:1px solid rgba(123,57,252,.12)}

/* ── Mode Toggle ── */
.mode-btn{flex:1;padding:16px 18px;border:2px solid var(--border);border-radius:12px;background:var(--surface);cursor:pointer;text-align:left;font-family:inherit;transition:all .2s}
.mode-btn:hover{border-color:var(--border-focus)}
.mode-btn.active{border-color:var(--primary);background:linear-gradient(135deg,#f0f5ff,#eaefff);box-shadow:0 2px 12px rgba(43,92,186,.1)}
.mode-btn h4{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.mode-btn.active h4{color:var(--primary-dark)}
.mode-btn p{font-size:11px;color:var(--text-muted);margin:0}

/* ── Login ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#0f0a1e 0%,var(--primary-dark) 35%,#4a1d96 70%,var(--primary) 100%);background-size:300% 300%;animation:gradShift 10s ease infinite}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.login-card{background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:22px;padding:48px 42px;width:100%;max-width:400px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.4)}
.login-card h1{font-size:24px;font-weight:700;margin-bottom:4px;color:var(--primary-dark)}
.login-card p{font-size:13px;color:var(--text-muted);margin-bottom:30px}
.login-card input{margin-bottom:16px;text-align:center;font-size:15px;padding:14px;border-radius:10px}
.login-card .error{color:var(--danger);font-size:12px;margin-bottom:12px;padding:8px 14px;background:#fef2f2;border-radius:8px;border:1px solid #fecaca}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;z-index:9998;background:rgba(15,23,42,.45);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center}
.modal-box{width:92%;max-width:740px;max-height:82vh;background:var(--surface);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.modal-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface-dim)}
.modal-header span{font-size:16px;font-weight:700;color:var(--primary-dark)}
.modal-body{flex:1;overflow:auto;padding:18px 24px}
.step-label{font-size:11px;font-weight:700;color:var(--text-secondary);margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase}

/* ── Print ── */
.print-overlay{position:fixed;inset:0;z-index:9999;background:rgba(15,23,42,.55);overflow:auto}
.print-wrap{max-width:800px;margin:24px auto;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-lg)}
.print-toolbar{display:flex;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--border);background:var(--surface-dim);border-radius:var(--radius) var(--radius) 0 0}
#print-area{padding:44px 52px;font-size:12px;color:#1a1a1a;line-height:1.6}
.header-table{width:100%;border-collapse:collapse;margin-bottom:22px;font-size:12px}
.header-table td{padding:7px 0}
.header-table .hl{color:#64748b;width:90px;font-weight:500}
.price-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px}
.price-table th{border:none;padding:9px 7px;font-weight:600;text-align:center;font-size:10.5px;background:var(--primary);color:#fff;white-space:nowrap}
.price-table th:first-child{border-radius:6px 0 0 0}
.price-table th:last-child{border-radius:0 6px 0 0}
.price-table td{border-bottom:1px solid #eef0f4;padding:8px 6px;white-space:nowrap}
.price-table td.wrap{white-space:normal;word-wrap:break-word}
.price-table tbody tr:hover{background:#f8faff}
.price-table .r{text-align:right}
.price-table .c{text-align:center}
.subtotal-row{background:#f9f7fe!important;font-weight:600;color:var(--primary-dark)}
.subtotal-row td{border-top:1px solid #e0dae8!important;border-bottom:1px solid #e0dae8!important}
.grand-total{margin-top:16px;padding:10px 16px;background:#f9f7fe;border-radius:8px;display:flex;justify-content:space-between;align-items:center;border:1px solid #e0dae8}
.grand-total span:first-child{font-size:13px;font-weight:700;color:var(--primary-dark)}
.grand-total span:last-child{font-size:16px;font-weight:700;color:#dc2626}
.remark-box{margin-top:14px;padding:12px 16px;background:#fffcf0;border:1px solid #f0e4a8;border-radius:var(--radius);font-size:11px}
.footer-notes{margin-top:34px;font-size:10px;color:#b0b6c2;line-height:1.8;border-top:1px solid #eef0f4;padding-top:16px}
@page{margin:15mm 10mm;size:A4}
@media print{
  body *{visibility:hidden}
  #print-area,#print-area *{visibility:visible}
  #print-area{position:fixed;left:0;top:0;width:100%;padding:30px 40px!important}
  .print-toolbar{display:none!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const API_URL = "https://wps-sku-api.kekeren97.workers.dev/";

const PRIVATE_LINES = ["WPS 365私有云", "私有云单品", "WPS 365私有云/私有云单品"];
const MAINT_TABLE1_NAMES = ["WPS文档中台", "WPS 文档中台智能版", "WPS 文档中台AI增值包", "网页轻阅读", "OCR识别", "文件转换迁移", "WPS黑马校对"];
const MAINT_TABLE2_NAMES = ["文档中心-专业版", "文档中心-增强版", "WPS协作办公系统", "365私网高级版", "365私网旗舰版", "WPS 365私网协作版"];
const AI_PRODUCT_NAMES = ["智能知识基座", "智能助手", "智能协作套件", "智能公文", "智能会议"];
const MAINT_PRICES = {
  table1: { A: 14000, B: 30000, C: 75000, D: 120000 },
  table2: { A: 33000, B: 60000, C: 150000, D: 240000 },
};

function getMaintTier(amount) {
  if (amount < 1000000) return 'A';
  if (amount < 5000000) return 'B';
  if (amount < 10000000) return 'C';
  return 'D';
}
function getMaintInfo(shortName, totalAmount) {
  const tier = getMaintTier(totalAmount);
  const tierLabel = { A: '<100万', B: '100-500万', C: '500-1000万', D: '>1000万' }[tier];
  if (MAINT_TABLE1_NAMES.includes(shortName)) return { tier, tierLabel, price: MAINT_PRICES.table1[tier] };
  if (MAINT_TABLE2_NAMES.includes(shortName)) return { tier, tierLabel, price: MAINT_PRICES.table2[tier] };
  return null;
}
function isPrivate(sku) { return PRIVATE_LINES.includes(sku.product_line); }
function isAI(name) { return AI_PRODUCT_NAMES.includes(name); }
function fmt(n) { return n == null ? '—' : Number(n).toLocaleString('zh-CN', { maximumFractionDigits: 2 }); }
function fmtPct(n) { return n == null ? '—' : (n * 100).toFixed(0) + '%'; }

// ══════════════════════════════════════════════
// API
// ══════════════════════════════════════════════
async function apiCall(action, extra = {}) {
  const pwd = sessionStorage.getItem('wps_pwd');
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, password: pwd, ...extra })
  });
  const data = await res.json();
  if (res.status === 401) throw new Error('密码错误');
  if (!res.ok) throw new Error(data.error || '请求失败');
  return data;
}

// ══════════════════════════════════════════════
// APP STATE
// ══════════════════════════════════════════════
var rowIdCounter = 1;
function makeRow() {
  return { id: rowIdCounter++, sku: null, qty: '', years: '1', composition: '', discountRate: '', maintYears: '', hasAI: false };
}

let state = {
  screen: 'login', // login | main
  loginError: '',
  loading: false,
  products: [],     // product list (no prices)
  skuCache: {},     // price_id -> full sku
  header: { customer: '', date: '', validUntil: '', contact: '' },
  rows: [makeRow()],
  quoteMode: 'B1',
  picker: null,     // { rowId, line, product }
  showPrint: false,
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

// ══════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════
async function doLogin() {
  const pwd = document.getElementById('pwd-input').value.trim();
  if (!pwd) return;
  sessionStorage.setItem('wps_pwd', pwd);
  setState({ loading: true, loginError: '' });
  try {
    const data = await apiCall('get_products');
    setState({ screen: 'main', products: data.products, loading: false });
  } catch (e) {
    sessionStorage.removeItem('wps_pwd');
    setState({ loginError: e.message, loading: false });
  }
}

// ══════════════════════════════════════════════
// PRODUCT PICKER
// ══════════════════════════════════════════════
function getLines() {
  return [...new Set(state.products.map(p => p.product_line))].sort();
}
// 公有云产品分组排序
const CLOUD_GROUP_ORDER = [
  // 商业系列套餐
  '商业协作版','商业高级版','商业旗舰版',
  // 企业系列套餐
  '企业高级版','企业旗舰版',
  // 协作系列套餐
  '协作办公高级平台','协作办公旗舰平台',
  // 教育系列套餐
  '教育标准版','教育高级版','教育旗舰版','教育协作版',
  '协作办公教育版标准平台','协作办公教育版高级平台','协作办公教育版旗舰平台',
  // 会议
  '会议高级版','会议一线版','会议300方','会议500方','会议1000方','会议2000方','会议室连接器','电话会议','会议直播','Meeting Hub',
  // 合同管理
  '合同管理标准版','合同管理专业版','合同管理旗舰版',
  // 项目管理
  '项目管理',
  // 校对翻译
  '黑马校对客户端','黑马校对字数包','医学专业翻译',
  // 在线预览
  '在线预览编辑200并发','在线预览编辑500并发',
  // AI
  '智能问答','智能问答接口','智能抽取','智能抽取接口',
  // 教育增值
  '智慧教育平台','智慧教育平台通识课','人工智能通识课','K12教学资源',
];
function getShortNames(line) {
  const map = {};
  state.products.filter(p => p.product_line === line).forEach(p => { map[p.short_name] = (map[p.short_name] || 0) + 1; });
  const entries = Object.entries(map);
  if (line === 'WPS 365公有云') {
    entries.sort((a, b) => {
      const ia = CLOUD_GROUP_ORDER.indexOf(a[0]);
      const ib = CLOUD_GROUP_ORDER.indexOf(b[0]);
      if (ia >= 0 && ib >= 0) return ia - ib;
      if (ia >= 0) return -1;
      if (ib >= 0) return 1;
      return a[0].localeCompare(b[0], 'zh');
    });
  } else {
    entries.sort((a, b) => a[0].localeCompare(b[0], 'zh'));
  }
  return entries;
}
function getSkuOptions(line, shortName) {
  return state.products.filter(p => p.product_line === line && p.short_name === shortName);
}

async function selectSku(productInfo) {
  // Fetch full price data
  try {
    let sku = state.skuCache[productInfo.price_id];
    if (!sku) {
      const data = await apiCall('get_price', { price_id: productInfo.price_id });
      sku = data.sku;
      state.skuCache[productInfo.price_id] = sku;
    }
    const rowId = state.picker.rowId;
    state.rows = state.rows.map(r => r.id === rowId ? { ...r, sku } : r);
    state.picker = null;
    render();
  } catch (e) {
    alert('获取价格失败: ' + e.message);
  }
}

// ══════════════════════════════════════════════
// ROW OPERATIONS
// ══════════════════════════════════════════════
function updateRow(id, field, value) {
  state.rows = state.rows.map(r => r.id === id ? { ...r, [field]: value } : r);
  render();
}
function removeRow(id) {
  state.rows = state.rows.filter(r => r.id !== id);
  if (state.rows.length === 0) state.rows = [makeRow()];
  render();
}
function addRow() {
  state.rows.push(makeRow());
  render();
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function render() {
  const root = document.getElementById('root');

  if (state.screen === 'login') {
    root.innerHTML = `
      <div class="login-wrap">
        <div class="login-card">
          <h1>WPS 报价工具</h1>
          <p>请输入访问密码</p>
          ${state.loginError ? `<div class="error">${state.loginError}</div>` : ''}
          <input type="password" id="pwd-input" placeholder="输入密码" onkeydown="if(event.key==='Enter')doLogin()">
          <br>
          <button class="btn btn-primary" style="width:100%;padding:12px;font-size:15px" onclick="doLogin()" ${state.loading ? 'disabled' : ''}>
            ${state.loading ? '验证中...' : '进入'}
          </button>
        </div>
      </div>`;
    return;
  }

  const hasAnyPrivate = state.rows.some(r => r.sku && isPrivate(r.sku));

  let html = `<div class="app">
    <div class="app-header">
      <div><h1>WPS 报价单生成工具</h1><p>选产品 → 填数量 → 生成报价单PDF</p></div>
    </div>`;

  // Header card
  html += `<div class="card card-accent">
    <div class="h2">📋 报价单抬头</div>
    <div class="row4">
      <div><label class="label">客户名称</label><input value="${esc(state.header.customer)}" oninput="updateHeader('customer',this.value)" placeholder="请输入客户名称"></div>
      <div><label class="label">报价日期</label><input type="date" value="${esc(state.header.date)}" oninput="updateHeader('date',this.value)"></div>
      <div><label class="label">有效期至</label><input type="date" value="${esc(state.header.validUntil)}" oninput="updateHeader('validUntil',this.value)"></div>
      <div><label class="label">销售联系人</label><input value="${esc(state.header.contact)}" oninput="updateHeader('contact',this.value)" placeholder="姓名"></div>
    </div>
  </div>`;

  // Products card
  html += `<div class="card">
    <div class="h2" style="justify-content:space-between">
      <span>📦 产品列表</span>
      <button class="btn btn-primary" style="font-size:12px" onclick="addRow()">+ 添加产品</button>
    </div>`;

  state.rows.forEach((row, idx) => {
    const isPriv = row.sku && isPrivate(row.sku);
    const q = Number(row.qty) || 0;
    const y = Number(row.years) || 1;
    const totalAmount = row.sku ? row.sku.suggested_price * q * y : 0;
    const maint = isPriv ? getMaintInfo(row.sku.short_name, totalAmount) : null;
    const disc = row.discountRate ? Number(row.discountRate) / 100 : null;
    const discAmount = disc ? totalAmount * disc : null;

    html += `<div class="product-row">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:13px;font-weight:600;color:#374151">产品 #${idx + 1}</span>
        ${state.rows.length > 1 ? `<button class="btn btn-danger" onclick="removeRow(${row.id})">删除</button>` : ''}
      </div>`;

    if (!row.sku) {
      html += `<button class="btn btn-pick" onclick="openPicker(${row.id})">点击选择产品</button>`;
    } else {
      html += `<div style="margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
          <span style="font-size:13px;font-weight:600;color:#1f2937;flex:1">${esc(row.sku.full_name)}</span>
          <span class="tag" style="background:#dbeafe;color:#1e40af">${esc(row.sku.license_type)}</span>
          <span class="tag" style="background:#dcfce7;color:#166534">¥${fmt(row.sku.suggested_price)}/${esc(row.sku.purchase_unit)}</span>
          <button class="btn btn-secondary" style="font-size:11px;padding:4px 10px" onclick="openPicker(${row.id})">更换</button>
        </div>
        <div style="font-size:11px;color:#9ca3af">${esc(row.sku.product_line)} · ${esc(row.sku.industry)} · 税率 ${fmtPct(row.sku.tax_rate)} · 起售 ${esc(row.sku.min_purchase)}</div>
      </div>`;

      const gridCols = isPriv ? 'row5' : 'row4';
      html += `<div class="${gridCols}">
        <div><label class="label">数量</label><input id="inp-qty-${row.id}" type="number" min="1" value="${esc(row.qty)}" onchange="updateRow(${row.id},'qty',this.value)" placeholder="数量"></div>
        <div><label class="label">授权年限</label><input id="inp-years-${row.id}" type="number" min="1" value="${esc(row.years)}" onchange="updateRow(${row.id},'years',this.value)" placeholder="年"></div>
        <div><label class="label">折扣率(%)</label><input id="inp-disc-${row.id}" type="number" min="1" max="100" value="${esc(row.discountRate)}" onchange="updateRow(${row.id},'discountRate',this.value)" placeholder="如85=85折"></div>`;
      if (isPriv) {
        html += `<div><label class="label">组成</label><input id="inp-comp-${row.id}" value="${esc(row.composition)}" oninput="updateRow(${row.id},'composition',this.value)" placeholder="手动填写"></div>
          <div><label class="label">运维保障年限</label><input id="inp-maint-${row.id}" type="number" min="1" value="${esc(row.maintYears)}" onchange="updateRow(${row.id},'maintYears',this.value)" placeholder="默认${y}年"></div>`;
      }
      html += `</div>`;

      if (isPriv) {
        html += `<label style="margin-top:8px;display:flex;align-items:center;gap:8px;padding:10px 14px;background:${row.hasAI?'#fef2f2':'#fafbfc'};border:1.5px solid ${row.hasAI?'#fca5a5':'#e5e7eb'};border-radius:8px;cursor:pointer;transition:all .15s">
          <input type="checkbox" id="ai-${row.id}" ${row.hasAI ? 'checked' : ''} onchange="updateRow(${row.id},'hasAI',this.checked)" style="width:18px;height:18px;accent-color:#dc2626">
          <div><div style="font-size:13px;font-weight:600;color:${row.hasAI?'#dc2626':'#374151'}">含 AI 加价购产品</div><div style="font-size:11px;color:#9ca3af">勾选后额外增加 7万元/年 AI运维保障包</div></div>
        </label>`;
      }

      html += `<div class="calc-preview" id="calc-${row.id}">`;
      if (q > 0) {
        html += `<span>产品金额：<strong>¥${fmt(totalAmount)}</strong></span>`;
        if (discAmount != null) html += `<span>折扣后：<strong>¥${fmt(discAmount)}</strong></span>`;
        if (maint) html += `<span>运维保障包（${maint.tier}包）：<strong>¥${fmt(maint.price)}/年</strong></span>`;
        if (row.hasAI) html += `<span>AI运维包：<strong>¥70,000/年</strong></span>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  });
  html += `</div>`;

  // Quote mode
  if (hasAnyPrivate) {
    html += `<div class="card">
      <div class="h2">🔀 报价模式（私有云产品）</div>
      <div style="display:flex;gap:10px">
        <button class="mode-btn ${state.quoteMode === 'B1' ? 'active' : ''}" onclick="setState({quoteMode:'B1'})">
          <h4>产品与服务分开报价</h4><p>产品表 + 服务表独立展示</p>
        </button>
        <button class="mode-btn ${state.quoteMode === 'B2' ? 'active' : ''}" onclick="setState({quoteMode:'B2'})">
          <h4>合并报价</h4><p>服务金额计入产品，备注栏注明</p>
        </button>
      </div>
    </div>`;
  }

  // Generate button
  const canGen = state.rows.some(r => r.sku && r.qty);
  html += `<div style="text-align:center;margin:20px 0 10px">
    <button class="btn btn-generate" onclick="${canGen ? 'showPrint()' : ''}" ${canGen ? '' : 'disabled'}>生成报价单</button>
    ${canGen ? '' : '<div style="font-size:11px;color:#9ca3af;margin-top:6px">请至少选择一个产品并填写数量</div>'}
  </div>`;

  html += `</div>`; // close .app

  // Picker modal
  if (state.picker) {
    const pk = state.picker;
    html += `<div class="modal-overlay" onclick="closePicker(event)">
      <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-header"><span>选择产品</span><button class="btn btn-secondary" style="font-size:12px" onclick="closePicker()">取消</button></div>
        <div class="modal-body">`;

    // Step 1
    html += `<div class="step-label">① 产品条线</div><div class="chip-group">`;
    getLines().forEach(l => {
      html += `<button class="chip ${pk.line === l ? 'active' : ''}" onclick="pickLine('${esc(l)}')">${esc(l)}</button>`;
    });
    html += `</div>`;

    // Step 2 + Step 3 combined
    if (pk.line) {
      const names = getShortNames(pk.line);

      if (pk.product) {
        // 已选产品简称 → 显示已选标签 + SKU选项
        html += `<div class="step-label">② 已选产品 <button class="chip active" style="margin-left:8px">${esc(pk.product)}</button> <button style="border:none;background:none;color:#2563eb;font-size:12px;cursor:pointer;text-decoration:underline" onclick="pickProduct(null)">重新选择</button></div>`;

        html += `<div class="step-label" style="margin-top:12px">③ 选择具体SKU</div>`;
        getSkuOptions(pk.line, pk.product).forEach(s => {
          html += `<button class="sku-option" onclick="selectSku(${esc(JSON.stringify(s))})">
            <div style="font-weight:600;color:#1f2937;margin-bottom:6px">${esc(s.full_name)}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              <span style="font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;background:#dbeafe;color:#1e40af">${esc(s.license_type)}</span>
              <span style="font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;background:#fef3c7;color:#92400e">${esc(s.industry)}</span>
              <span style="font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;background:#dcfce7;color:#166534">${esc(s.spec_external || '—')}</span>
            </div>
          </button>`;
        });

      } else {
        // 未选产品简称 → 显示分组列表
        html += `<div class="step-label">② 产品简称</div>`;

        if (pk.line === 'WPS 365公有云') {
          const groups = [
            { label: '📋 商业系列', color: '#2563eb', bg: '#eff6ff', names: ['商业协作版','商业高级版','商业旗舰版'] },
            { label: '🏢 企业系列', color: '#7c3aed', bg: '#f5f3ff', names: ['企业高级版','企业旗舰版'] },
            { label: '🤝 协作系列', color: '#0891b2', bg: '#ecfeff', names: ['协作办公高级平台','协作办公旗舰平台'] },
            { label: '🎓 教育系列', color: '#059669', bg: '#ecfdf5', names: ['教育标准版','教育高级版','教育旗舰版','教育协作版','协作办公教育版标准平台','协作办公教育版高级平台','协作办公教育版旗舰平台'] },
            { label: '📹 会议', color: '#b45309', bg: '#fffbeb', names: ['会议高级版','会议一线版','会议300方','会议500方','会议1000方','会议2000方','会议室连接器','电话会议','会议直播','Meeting Hub'] },
            { label: '📝 合同管理', color: '#be185d', bg: '#fdf2f8', names: ['合同管理标准版','合同管理专业版','合同管理旗舰版'] },
            { label: '📊 项目管理 · 校对 · 翻译', color: '#4338ca', bg: '#eef2ff', names: ['项目管理','黑马校对客户端','黑马校对字数包','医学专业翻译'] },
            { label: '🔗 在线预览编辑', color: '#0e7490', bg: '#ecfeff', names: ['在线预览编辑200并发','在线预览编辑500并发'] },
            { label: '🤖 AI 能力包', color: '#dc2626', bg: '#fef2f2', names: ['智能问答','智能问答接口','智能抽取','智能抽取接口'] },
            { label: '📚 教育增值', color: '#059669', bg: '#ecfdf5', names: ['智慧教育平台','智慧教育平台通识课','人工智能通识课','K12教学资源'] },
          ];
          const nameMap = {};
          names.forEach(([n, c]) => { nameMap[n] = c; });

          groups.forEach(g => {
            const items = g.names.filter(n => n in nameMap);
            if (items.length === 0) return;
            html += `<div style="margin-bottom:12px">
              <div style="font-size:12px;font-weight:600;color:${g.color};margin-bottom:6px;padding:4px 10px;background:${g.bg};border-radius:6px;display:inline-block">${g.label}</div>
              <div class="chip-group" style="margin-top:6px">`;
            items.forEach(name => {
              const count = nameMap[name];
              html += `<button class="chip" onclick="pickProduct('${esc(name)}')">${esc(name)}${count > 1 ? ' (' + count + ')' : ''}</button>`;
            });
            html += `</div></div>`;
          });

          const grouped = new Set(groups.flatMap(g => g.names));
          const ungrouped = names.filter(([n]) => !grouped.has(n));
          if (ungrouped.length > 0) {
            html += `<div style="margin-bottom:12px">
              <div style="font-size:12px;font-weight:600;color:#6b7280;margin-bottom:6px">其他</div>
              <div class="chip-group">`;
            ungrouped.forEach(([name, count]) => {
              html += `<button class="chip" onclick="pickProduct('${esc(name)}')">${esc(name)}${count > 1 ? ' (' + count + ')' : ''}</button>`;
            });
            html += `</div></div>`;
          }
        } else {
          html += `<div class="chip-group">`;
          names.forEach(([name, count]) => {
            html += `<button class="chip" onclick="pickProduct('${esc(name)}')">${esc(name)}${count > 1 ? ' (' + count + ')' : ''}</button>`;
          });
          html += `</div>`;
        }
      }
    }

    html += `</div></div></div>`;
  }

  // Print modal
  if (state.showPrint) {
    html += renderPrintModal();
  }

  root.innerHTML = html;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

      </tr></thead><tbody>`;
    serviceRows.forEach((r, i) => {
      html += `<tr><td>${esc(r.name)}</td><td class="c">${r.years}年</td><td class="c">${fmt(r.unitPrice)}</td><td class="r">${fmt(r.amount)}</td></tr>`;
    });
    html += `<tr class="subtotal-row"><td colspan="3" class="r">服务小计</td><td class="r">${fmt(serviceTotal)}</td></tr></tbody></table>`;
  }

  // B2 remark
  if (mode === 'B2' && hasPriv) {
    let remarkParts = [];
    productRows.filter(r => isPrivate(r.sku)).forEach(r => {
      const mi = getMaintInfo(r.sku.short_name, r.amount);
      if (mi) remarkParts.push(`${r.sku.short_name}运维保障包（${mi.tier}包，${fmt(mi.price)}元/年）`);
      if (r.hasAI) remarkParts.push('AI运维保障包（70,000元/年）');
    });
    if (remarkParts.length) {
      html += `<div class="remark-box"><strong>备注：</strong>本报价含私有云运维保障服务。${esc(remarkParts.join('；'))}</div>`;
    }
  }

  html += `<div class="grand-total"><span>报价总计</span><span>¥${fmt(grandTotal)}</span></div>
    <div class="footer-notes">
      <div>1. 以上价格为含税价格，具体税率以各产品行标注为准。</div>
      <div>2. 本报价单有效期至 ${esc(h.validUntil) || '—'}。</div>
      <div>3. 最终成交价格以双方签署的正式合同为准。</div>
    </div>
  </div></div></div>`;

  return html;
}

// ══════════════════════════════════════════════
// GLOBAL HANDLERS
// ══════════════════════════════════════════════
window.updateHeader = function(key, val) { state.header[key] = val; /* no re-render needed */ };
window.updateRow = updateRow;
window.removeRow = removeRow;
window.addRow = addRow;
window.setState = setState;
window.doLogin = doLogin;
window.selectSku = selectSku;
window.showPrint = function() { setState({ showPrint: true }); };

window.openPicker = function(rowId) {
  state.picker = { rowId, line: null, product: null };
  render();
};
window.closePicker = function(e) {
  if (e && e.target !== e.currentTarget) return;
  state.picker = null;
  render();
};
window.pickLine = function(line) {
  state.picker.line = line;
  state.picker.product = null;
  render();
};
window.pickProduct = function(name) {
  state.picker.product = name;
  render();
};

// Initial render
render();
</script>
</body>
</html>
