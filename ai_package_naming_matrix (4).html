<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>输入密码</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            .staticrypt-hr {
                margin-top: 20px;
                margin-bottom: 20px;
                border: 0;
                border-top: 1px solid #eee;
            }

            .staticrypt-page {
                width: 360px;
                padding: 8% 0 0;
                margin: auto;
                box-sizing: border-box;
            }

            .staticrypt-form {
                position: relative;
                z-index: 10;
                background: rgba(3, 8, 24, 0.88);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border: 1px solid rgba(255, 140, 30, 0.35);
                max-width: 360px;
                margin: 0 auto 100px;
                padding: 45px;
                text-align: center;
                box-shadow: 0 0 50px rgba(255,100,10,0.25), 0 0 100px rgba(180,60,0,0.12);
                border-radius: 14px;
            }

            .staticrypt-form input[type="password"],
            input[type="text"] {
                background: inherit;
                border: 0;
                box-sizing: border-box; /* This ensures padding is included in the total width */
                font-size: 14px;
                outline: 0;
                padding: 15px 30px 15px 15px;
                width: 100%;
                color: #ffe0b0;
            }

            .staticrypt-password-container {
                position: relative;
                outline: 0;
                background: rgba(255,255,255,0.07); border: 1px solid rgba(255,140,30,0.25);
                width: 100%;
                border: 0;
                margin: 0 0 15px;
                box-sizing: border-box;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                opacity: 60%;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                outline: 0;
                background: linear-gradient(135deg, #b84000, #7a1a00);
                width: 100%;
                border: 1px solid rgba(255,140,30,0.5);
                padding: 15px;
                color: #ffcc80;
                font-size: 14px;
                cursor: pointer;
                border-radius: 8px;
                letter-spacing: 2px;
                transition: all 0.3s ease;
                box-shadow: 0 0 18px rgba(200,80,0,0.5);
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: linear-gradient(135deg, #e05000, #aa2800);
                box-shadow: 0 0 30px rgba(255,120,20,0.8);
                color: #ffffff;
            }

            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                margin-bottom: 1em;
                background: #000008;
                font-family: "Arial", sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-instructions {
                margin-top: -1em;
                margin-bottom: 1em;
            }

            .staticrypt-title {
                font-size: 1.5em;
                color: #ffcc80;
                text-shadow: 0 0 12px rgba(255,140,30,0.9);
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 1em;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.5);
                margin-right: 1em;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid gray;
                border-right-color: transparent;
                border-radius: 50%;
                -webkit-animation: spinner-border 0.75s linear infinite;
                animation: spinner-border 0.75s linear infinite;
                animation-duration: 0.75s;
                animation-timing-function: linear;
                animation-delay: 0s;
                animation-iteration-count: infinite;
                animation-direction: normal;
                animation-fill-mode: none;
                animation-play-state: running;
                animation-name: spinner-border;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                input[type="text"] {
                    font-size: 16px;
                }
            }

            /* ====== GALAXY OVERLAY ====== */
            #gx-overlay {
                position: fixed; inset: 0; z-index: 900;
                overflow: hidden;
                transition: opacity 1.2s ease;
            }
            #gx-overlay.dissolve { opacity: 0; pointer-events: none; }
            #gx-bg {
                position: absolute; inset: 0;
                width: 100%; height: 100%;
            }
            #gx-fire-wrap {
                position: absolute;
                top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                cursor: pointer;
                z-index: 10;
                animation: fireFloat 4s ease-in-out infinite;
            }
            @keyframes fireFloat {
                0%,100% { transform: translate(-50%,-50%) translateY(0px) scale(1);   }
                50%      { transform: translate(-50%,-50%) translateY(-14px) scale(1.03); }
            }
            #gx-fire-canvas { display: block; }
            #gx-hint {
                position: absolute;
                bottom: 14%;
                width: 100%;
                text-align: center;
                color: rgba(255,180,60,0.85);
                font-size: 15px;
                font-family: "Microsoft YaHei", sans-serif;
                letter-spacing: 3px;
                pointer-events: none;
                animation: hintPulse 2.4s ease-in-out infinite;
                text-shadow: 0 0 10px rgba(255,120,0,0.6);
            }
            @keyframes hintPulse {
                0%,100% { opacity: 0.7; }
                50%      { opacity: 1; }
            }
            .staticrypt-content { position: relative; z-index: 1; }
        </style>
    </head>

    <script>
    (function() {
      /* ──────────────── CONFIG ──────────────── */
      var BG    = document.getElementById('gx-bg');
      var bctx  = BG.getContext('2d');
      var FC    = document.getElementById('gx-fire-canvas');
      var fctx  = FC.getContext('2d');
      var OV    = document.getElementById('gx-overlay');
      var WRAP  = document.getElementById('gx-fire-wrap');
      var W, H;

      /* ──────────────── STARS ──────────────── */
      var stars = [];
      for(var i=0;i<320;i++){
        stars.push({
          x: Math.random(), y: Math.random(),
          r: Math.pow(Math.random(),3)*2+0.2,
          a: Math.random()*0.8+0.2,
          tw: Math.random()*Math.PI*2,
          bright: Math.random()>0.96
        });
      }

      /* ──────────────── RESIZE ──────────────── */
      function resize(){
        W = BG.width  = window.innerWidth;
        H = BG.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      /* ──────────────── GALAXY SPIRAL ──────────────── */
      var spiralRot = 0;
      function drawGalaxy(cx, cy, t) {
        var maxR = Math.min(W, H) * 0.46;

        /* deep space base */
        var base = bctx.createRadialGradient(cx,cy,0,cx,cy,maxR*1.8);
        base.addColorStop(0,  'rgba(18,5,0,1)');
        base.addColorStop(0.25,'rgba(6,2,12,1)');
        base.addColorStop(1,  'rgba(0,0,4,1)');
        bctx.fillStyle = base;
        bctx.fillRect(0,0,W,H);

        bctx.save();
        bctx.translate(cx, cy);
        bctx.rotate(spiralRot);

        /* 2 main arms */
        for(var arm=0; arm<2; arm++){
          bctx.save();
          bctx.rotate(arm * Math.PI);

          for(var pass=0; pass<3; pass++){
            /* each pass: different width + opacity for depth */
            var lw   = [90, 45, 18][pass];
            var alph = [0.55, 0.35, 0.18][pass];
            var col  = ['rgba(22,35,70,', 'rgba(35,55,105,', 'rgba(70,100,160,'][pass];

            bctx.beginPath();
            var first=true;
            for(var k=0; k<=180; k++){
              var frac = k/180;
              var theta = frac * Math.PI * 2.4;
              var r     = frac * maxR;
              var x     = r * Math.cos(theta);
              var y     = r * Math.sin(theta) * 0.55;
              if(first){ bctx.moveTo(x,y); first=false; }
              else bctx.lineTo(x,y);
            }
            bctx.strokeStyle = col + alph + ')';
            bctx.lineWidth   = lw;
            bctx.lineCap     = 'round';
            bctx.lineJoin    = 'round';
            bctx.stroke();
          }
          bctx.restore();
        }

        /* third faint arm for richness */
        bctx.save();
        bctx.rotate(Math.PI * 0.67);
        bctx.beginPath();
        var first=true;
        for(var k=0;k<=120;k++){
          var frac=k/120, theta=frac*Math.PI*1.8, r=frac*maxR*0.7;
          var x=r*Math.cos(theta), y=r*Math.sin(theta)*0.5;
          if(first){bctx.moveTo(x,y);first=false;} else bctx.lineTo(x,y);
        }
        bctx.strokeStyle='rgba(15,25,55,0.4)';
        bctx.lineWidth=55; bctx.stroke();
        bctx.restore();

        bctx.restore();

        /* central amber-orange glow around the fire ball */
        var cg = bctx.createRadialGradient(cx,cy,0,cx,cy,maxR*0.28);
        cg.addColorStop(0,   'rgba(255,160,30,0.22)');
        cg.addColorStop(0.4, 'rgba(200,80,10,0.12)');
        cg.addColorStop(1,   'rgba(150,40,0,0)');
        bctx.fillStyle=cg;
        bctx.fillRect(0,0,W,H);
      }

      /* ──────────────── STARS DRAW ──────────────── */
      function drawStars(t){
        stars.forEach(function(s){
          var tw = Math.sin(t*1.2+s.tw)*0.25;
          var a  = Math.min(1, s.a+tw);
          if(s.bright){
            /* 4-point star shape */
            var sx=s.x*W, sy=s.y*H, sz=s.r*1.8;
            bctx.save();
            bctx.translate(sx,sy);
            bctx.fillStyle='rgba(255,240,200,'+a+')';
            bctx.beginPath();
            for(var p=0;p<4;p++){
              var pa=p/4*Math.PI*2;
              bctx.lineTo(Math.cos(pa)*sz*2.5, Math.sin(pa)*sz*2.5);
              bctx.lineTo(Math.cos(pa+Math.PI/4)*sz*0.4, Math.sin(pa+Math.PI/4)*sz*0.4);
            }
            bctx.closePath(); bctx.fill();
            bctx.restore();
          } else {
            bctx.beginPath();
            bctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
            bctx.fillStyle='rgba(210,225,255,'+a+')';
            bctx.fill();
          }
        });
      }

      /* distant galaxies */
      var distGal = [
        {x:0.08,y:0.14,a:0.35,rx:18,ry:6,rot:0.6},
        {x:0.88,y:0.08,a:0.25,rx:22,ry:7,rot:-0.3},
        {x:0.92,y:0.78,a:0.3, rx:15,ry:5,rot:0.9},
        {x:0.05,y:0.85,a:0.2, rx:20,ry:6,rot:-0.5},
        {x:0.75,y:0.92,a:0.22,rx:14,ry:4,rot:0.4}
      ];
      function drawDistantGalaxies(){
        distGal.forEach(function(g){
          bctx.save();
          bctx.translate(g.x*W, g.y*H);
          bctx.rotate(g.rot);
          var gg=bctx.createRadialGradient(0,0,0,0,0,g.rx);
          gg.addColorStop(0,'rgba(180,180,220,'+g.a+')');
          gg.addColorStop(1,'rgba(100,100,160,0)');
          bctx.fillStyle=gg;
          bctx.scale(1, g.ry/g.rx);
          bctx.beginPath(); bctx.arc(0,0,g.rx,0,Math.PI*2); bctx.fill();
          bctx.restore();
        });
      }

      /* ──────────────── FIRE BALL ──────────────── */
      var FR = 100;   /* fire ball radius in canvas coords */
      var FCX = 160, FCY = 160;
      var fireParticles = [];
      for(var i=0;i<120;i++) fireParticles.push(newFP());
      function newFP(){
        var a=Math.random()*Math.PI*2;
        var sp=Math.random()*3.5+1.8;
        return {
          x: FCX+Math.cos(a)*FR*(0.75+Math.random()*0.25),
          y: FCY+Math.sin(a)*FR*(0.75+Math.random()*0.25),
          vx: Math.cos(a)*sp*0.5+(Math.random()-0.5)*2,
          vy: Math.sin(a)*sp*0.5+(Math.random()-0.5)*2 - 1.5,
          life: Math.random(),
          decay: 0.01+Math.random()*0.015,
          size: Math.random()*12+6,
          hue: Math.random()*50   /* 0=red  50=orange-yellow */
        };
      }

      function drawFireBall(t){
        fctx.clearRect(0,0,320,320);

        /* outer corona glow */
        var og=fctx.createRadialGradient(FCX,FCY,FR*0.6,FCX,FCY,FR*2.2);
        og.addColorStop(0,  'rgba(255,130,20,0.38)');
        og.addColorStop(0.35,'rgba(220,70,5,0.18)');
        og.addColorStop(1,  'rgba(180,30,0,0)');
        fctx.fillStyle=og;
        fctx.fillRect(0,0,320,320);

        /* particles first (behind sphere) */
        fireParticles.forEach(function(p){
          var dist=Math.sqrt((p.x-FCX)*(p.x-FCX)+(p.y-FCY)*(p.y-FCY));
          if(dist < FR*1.05){
            fctx.beginPath();
            fctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
            fctx.fillStyle='hsla('+p.hue+',100%,65%,'+(p.life*0.7)+')';
            fctx.shadowColor='hsl('+p.hue+',100%,70%)';
            fctx.shadowBlur=12;
            fctx.fill();
            fctx.shadowBlur=0;
          }
        });

        /* sphere body */
        var sg=fctx.createRadialGradient(FCX-FR*0.25,FCY-FR*0.25,FR*0.05,FCX,FCY,FR);
        sg.addColorStop(0,  '#fff5a0');
        sg.addColorStop(0.15,'#ffcc00');
        sg.addColorStop(0.4, '#ff8800');
        sg.addColorStop(0.65,'#cc2200');
        sg.addColorStop(1,  '#5a0005');
        fctx.beginPath();
        fctx.arc(FCX,FCY,FR,0,Math.PI*2);
        fctx.fillStyle=sg;
        fctx.fill();

        /* surface texture - lava patches */
        fctx.save();
        fctx.beginPath();
        fctx.arc(FCX,FCY,FR,0,Math.PI*2);
        fctx.clip();
        for(var i=0;i<8;i++){
          var a=i/8*Math.PI*2+t*0.3;
          var pr=FR*(0.4+Math.sin(t*1.1+i)*0.2);
          var px=FCX+Math.cos(a)*pr, py=FCY+Math.sin(a)*pr;
          var pg=fctx.createRadialGradient(px,py,2,px,py,FR*0.3);
          pg.addColorStop(0,'rgba(255,220,0,0.18)');
          pg.addColorStop(1,'rgba(160,30,0,0)');
          fctx.fillStyle=pg;
          fctx.fillRect(0,0,320,320);
        }
        fctx.restore();

        /* corona flares around edge */
        for(var i=0;i<14;i++){
          var fa=i/14*Math.PI*2+t*0.4;
          var fr2=FR*(1.05+Math.sin(t*2.5+i*0.9)*0.12);
          var fx=FCX+Math.cos(fa)*fr2, fy=FCY+Math.sin(fa)*fr2;
          fctx.beginPath();
          fctx.arc(fx,fy,FR*0.10,0,Math.PI*2);
          fctx.fillStyle='rgba(255,160,20,'+(0.35+Math.sin(t*3+i)*0.2)+')';
          fctx.shadowColor='#ff8800'; fctx.shadowBlur=8;
          fctx.fill(); fctx.shadowBlur=0;
        }

        /* particles outside sphere */
        fireParticles=fireParticles.map(function(p){
          var dist=Math.sqrt((p.x-FCX)*(p.x-FCX)+(p.y-FCY)*(p.y-FCY));
          if(dist >= FR*1.05){
            fctx.beginPath();
            fctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
            fctx.fillStyle='hsla('+p.hue+',100%,65%,'+(p.life*0.85)+')';
            fctx.shadowColor='hsl('+p.hue+',100%,70%)'; fctx.shadowBlur=10;
            fctx.fill(); fctx.shadowBlur=0;
          }
          p.x+=p.vx; p.y+=p.vy; p.vy-=0.02; p.life-=p.decay;
          if(p.life<=0) return newFP();
          return p;
        });

        /* rim highlight */
        var rim=fctx.createRadialGradient(FCX-FR*0.3,FCY-FR*0.3,5,FCX,FCY,FR);
        rim.addColorStop(0,'rgba(255,255,200,0.38)');
        rim.addColorStop(0.35,'rgba(255,180,50,0.1)');
        rim.addColorStop(1,'rgba(0,0,0,0)');
        fctx.beginPath(); fctx.arc(FCX,FCY,FR,0,Math.PI*2);
        fctx.fillStyle=rim; fctx.fill();
      }

      /* ──────────────── MAIN LOOP ──────────────── */
      var startTime = Date.now();
      function loop(){
        var t = (Date.now()-startTime)/1000;
        spiralRot += 0.00018;   /* very slow rotation */
        var cx=W/2, cy=H/2;

        bctx.clearRect(0,0,W,H);
        drawGalaxy(cx, cy, t);
        drawDistantGalaxies();
        drawStars(t);
        drawFireBall(t);

        requestAnimationFrame(loop);
      }
      loop();

      /* ──────────────── CLICK HANDLER ──────────────── */
      WRAP.addEventListener('click', function(){
        OV.classList.add('dissolve');
        setTimeout(function(){ OV.style.display='none'; }, 1300);
      });

    })();
    </script>
